<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Config Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
text-align:center;
margin-bottom:20px;
color:#94a3b8;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:20px;
background:#1e293b;
color:white;
font-size:16px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.server{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.type{
color:#38bdf8;
margin-bottom:10px;
}

textarea{
width:100%;
height:90px;
background:#0f172a;
color:#22c55e;
border:1px solid #334155;
border-radius:10px;
padding:10px;
resize:none;
}

.btn{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#1d4ed8;
}

.success{
position:fixed;
bottom:20px;
left:20px;
background:#16a34a;
padding:10px 15px;
border-radius:8px;
display:none;
}
</style>
</head>
<body>

<div class="container">

<h1>VPN Config Store</h1>

<div class="stats">
تعداد کانفیگ‌ها: <span id="count">0</span>
</div>

<input
id="search"
type="text"
placeholder="جستجوی سرور..."
onkeyup="searchConfigs()"
/>

<div id="configs"></div>

</div>

<div class="success" id="toast">
کانفیگ کپی شد ✅
</div>

<script>

const configs = [

{
name:"Germany #1",
type:"VLESS",
config:"vless://YOUR-CONFIG-1"
},

{
name:"Turkey #1",
type:"VMESS",
config:"vmess://YOUR-CONFIG-2"
},

{
name:"Netherlands #1",
type:"TROJAN",
config:"trojan://YOUR-CONFIG-3"
}

];

function render(data){

const container=document.getElementById("configs");

container.innerHTML="";

data.forEach(item=>{

container.innerHTML += `
<div class="card">

<div class="server">${item.name}</div>

<div class="type">${item.type}</div>

<textarea readonly>${item.config}</textarea>

<button
class="btn"
onclick="copyConfig(\`${item.config}\`)">
کپی کانفیگ
</button>

</div>
`;

});

document.getElementById("count").innerText=data.length;

}

async function copyConfig(text){

await navigator.clipboard.writeText(text);

const toast=document.getElementById("toast");

toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);

}

function searchConfigs(){

const value=document
.getElementById("search")
.value
.toLowerCase();

const filtered=configs.filter(item=>
item.name.toLowerCase().includes(value) ||
item.type.toLowerCase().includes(value)
);

render(filtered);

}

render(configs);

</script>

</body>
</html>
